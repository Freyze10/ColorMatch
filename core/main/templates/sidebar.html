{% load static %}
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h4 class="mb-0 logo-text">MBPI</h4>
        <button class="btn btn-sm text-white" id="toggleSidebar">
            <i class="bi bi-list fs-5"></i>
        </button>
    </div>

    <div class="sidebar-menu">
        <ul class="nav flex-column mt-2">
            <li class="nav-item">
                <a href="{% url 'dashboard' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="{% url 'other' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'other' %}active{% endif %}">
                    <i class="bi bi-puzzle"></i>
                    <span>Other Page</span>
                </a>
            </li>

            <!-- CMF Parent Menu -->
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'cmf_records' %}active{% endif %}" 
                   data-bs-toggle="collapse" href="#appsMenu" role="button" 
                   aria-expanded="{% if request.resolver_match.url_name == 'cmf_records' %}true{% else %}false{% endif %}">
                    <i class="bi bi-file-earmark-text"></i>
                    <span>CMF</span>
                    <i class="bi bi-chevron-down arrow-icon"></i>
                </a>
                <!-- Add 'show' class so it stays open when active -->
                <div class="collapse {% if request.resolver_match.url_name == 'cmf_records' %}show{% endif %}" id="appsMenu">
                    <ul class="nav flex-column submenu" style="padding-left: 2rem;">
                        <li>
                            <a href="{% url 'cmf_records' %}"
                               class="nav-link {% if request.resolver_match.url_name == 'cmf_records' %}active-sub{% endif %}">
                                CMF Records
                            </a>
                        </li> 
                        <li>
                            <a href="{% url 'cmf_entry' %}"
                               class="nav-link {% if request.resolver_match.url_name == 'cmf_entry' %}active-sub{% endif %}">
                                CMF Entry
                            </a>
                        </li>
                        <li><a class="nav-link" href="#">RS Entry</a></li>
                        <li><a class="nav-link" href="#">MB Formula</a></li>
                        <li><a class="nav-link" href="#">DC Formula</a></li>
                        <li><a class="nav-link" href="#">Pending/Completed</a></li>
                    </ul>
                </div>
            </li>
        </ul>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
        <div class="dropup">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-profile-link" data-bs-toggle="dropdown">
                <div class="d-flex align-items-center">
                    <i class="bi bi-person-circle fs-4 text-teal"></i>
                    <div class="user-info ms-2">
                        <span class="user-name d-block">Brant Jan</span>
                        <small class="user-role d-block">Administrator</small>
                    </div>
                </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark shadow w-100">
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
            </ul>
        </div>
    </div>
</aside>
