{% load static %}
<aside class="sidebar" id="sidebar">
    <!-- Header: Corporate Teal -->
    <div class="sidebar-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0 logo-text">MBPI</h4>
        <button class="btn btn-sm text-white" id="toggleSidebar">
            <i class="bi bi-list fs-5"></i>
        </button>
    </div>

    <!-- Scrollable Menu -->
    <div class="sidebar-menu">
        <ul class="nav flex-column mt-2">
            <li class="nav-item">
                <a href="{% url 'dashboard' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="{% url 'other' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'other' %}active{% endif %}">
                    <i class="bi bi-puzzle"></i>
                    <span>Other Page</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link d-flex justify-content-between align-items-center" 
                   data-bs-toggle="collapse" href="#appsMenu" role="button">
                    <div>
                        <i class="bi bi-grid"></i>
                        <span>Apps</span>
                    </div>
                    <i class="bi bi-chevron-down arrow-icon"></i>
                </a>
                <div class="collapse" id="appsMenu">
                    <ul class="nav flex-column submenu">
                        <li><a class="nav-link" href="#">Mail</a></li>
                        <li><a class="nav-link" href="#">Calendar</a></li>
                    </ul>
                </div>
            </li>
        </ul>
    </div>

    <!-- Footer: Slate with Teal accent -->
    <div class="sidebar-footer">
        <div class="dropup">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-profile-link" data-bs-toggle="dropdown">
                <div class="user-avatar-wrapper">
                    <i class="bi bi-person-circle fs-4 text-teal"></i>
                </div>
                <div class="user-info ms-2">
                    <span class="user-name d-block text-white">Brant Jan</span>
                    <small class="text-white-50 user-role">Administrator</small>
                </div>
            </a>
            <!-- Dark themed dropdown -->
            <ul class="dropdown-menu dropdown-menu-dark shadow">
                <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
                <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>
</aside>
